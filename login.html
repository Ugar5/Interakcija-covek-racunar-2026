<div class="card login">
  <div class="card-header text-center">
    <h2>Login</h2>
  </div>
  <div class="card-body">
    <div class="mb-3 row">
      
      
    </div>
    <form [formGroup]="form" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="email" class="form-label">Email address</label>
        <input
          type="email"
          class="form-control" 
          id="email"
          aria-describedby="emailHelp"
          formControlName="email"
        />
        
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input 
            type="password" 
            class="form-control" 
            id="password" 
            formControlName="password" 
        />
      </div>
     
      <button  class="btn btn-primary" type="submit"><i class="fa-solid fa-arrow-right-to-bracket"></i>Submit</button>
    </form>
  </div>
</div>
